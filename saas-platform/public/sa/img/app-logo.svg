<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" style="display: none;">
    <symbol id="custom-logo" viewBox="0 0 180 32">
        <!-- Paw icon (simple circles) -->
        <circle cx="7"  cy="7"  r="3"   style="fill:var(--logo-color,currentColor)"/>
        <circle cx="14" cy="5"  r="2.5" style="fill:var(--logo-color,currentColor)"/>
        <circle cx="3"  cy="13" r="2.2" style="fill:var(--logo-color,currentColor)"/>
        <circle cx="18" cy="11" r="2"   style="fill:var(--logo-color,currentColor)"/>
        <ellipse cx="10.5" cy="21" rx="8" ry="6.5" style="fill:var(--logo-color,currentColor)"/>
        <!-- TheraPano wordmark -->
        <text x="28" y="23"
              font-family="Inter, -apple-system, BlinkMacSystemFont, sans-serif"
              font-weight="700"
              font-size="18"
              style="fill:var(--logo-color,currentColor)">TheraPano</text>
    </symbol>
</svg>
